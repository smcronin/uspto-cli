name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go vet ./...

      - run: go build -o /dev/null .
        if: runner.os != 'Windows'

      - run: go build -o NUL .
        if: runner.os == 'Windows'

      - run: go test ./...
